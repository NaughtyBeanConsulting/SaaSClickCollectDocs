name: Docs Pages

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    if: github.event_name != 'workflow_dispatch' || github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          DOCS_SITE_URL: ${{ vars.DOCS_SITE_URL != '' && vars.DOCS_SITE_URL || format('https://{0}.github.io', github.repository_owner) }}
          DOCS_BASE_URL: ${{ vars.DOCS_BASE_URL != '' && vars.DOCS_BASE_URL || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Upload PR build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: build
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.ref_name == 'main')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4